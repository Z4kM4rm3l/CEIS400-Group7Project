spring:
  application:
    name: depot-ops-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:depotdb;DB_CLOSE_DELAY=-1;MODE=MySQL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:sa}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET:b20a0c46f1e64b29b20a0c46f1e64b29b20a0c46f1e64b29b20a0c46f1e64b29}