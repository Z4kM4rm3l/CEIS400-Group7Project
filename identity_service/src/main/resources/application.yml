mvn -q -pl identity_service spring-boot:runspring:
  application:
    name: identity-service
  datasource:
    url: jdbc:h2:mem:identitydb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: update   # dev-only; use 'validate' in prod
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

jwt:
  issuer: ToolVault
  access-exp-min: 15
  refresh-exp-min: 4320
  secret: "b20a0c46f1e64b29b20a0c46f1e64b29b20a0c46f1e64b29b20a0c46f1e64b29"
