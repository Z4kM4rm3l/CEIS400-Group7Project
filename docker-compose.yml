services:

  mysql:
    image: mysql:8.4
    container_name: toolvault-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: toolvault_identity
      MYSQL_USER: toolvault
      MYSQL_PASSWORD: toolvault_pw
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -prootpw || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  identity-service:
    build: ./identity_service
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/toolvault_identity
      - SPRING_DATASOURCE_USERNAME=toolvault
      - SPRING_DATASOURCE_PASSWORD=toolvault_pw
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=toolvault-secret-change-in-production
      - JWT_ISSUER=toolvault
      - JWT_ACCESS_EXP_MIN=60

  depot-ops-service:
    build: ./depot-ops-service
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/toolvault_depot
      - SPRING_DATASOURCE_USERNAME=toolvault
      - SPRING_DATASOURCE_PASSWORD=toolvault_pw
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=toolvault-secret-change-in-production

  warehouse-ops-service:
    build: ./warehouse-ops-service
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/toolvault_warehouse
      - SPRING_DATASOURCE_USERNAME=toolvault
      - SPRING_DATASOURCE_PASSWORD=toolvault_pw
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

volumes:
  mysql_data: {}