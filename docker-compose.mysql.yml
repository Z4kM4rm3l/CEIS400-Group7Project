version: "3.9"
services:
  mysql:
    image: mysql:8.4
    container_name: toolvault-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: toolvault_identity
      MYSQL_USER: toolvault
      MYSQL_PASSWORD: toolvault_pw
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -prootpw || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data: {}
